# K-Quant Scoring Configuration
# Each category weight must sum to 1.0

weights:
  macro: 0.10
  flow: 0.15          # v9.6.1: 30→15% (수급 데이터 부족 현실 반영)
  fundamental: 0.30
  technical: 0.30     # v9.6.1: 20→30% (가격 기반, 안정적)
  risk: 0.15          # v9.6.1: 10→15%

thresholds:
  # Technical
  rsi_oversold: 30
  rsi_overbought: 70
  bb_lower_pct: 0.2
  bb_upper_pct: 0.8
  macd_signal_threshold: 0.0

  # Fundamental
  debt_ratio_max: 200
  per_max: 30
  per_min: 5
  roe_min: 8.0
  consensus_target_pct: 10.0

  # Flow
  foreign_net_buy_days: 3
  institution_net_buy_days: 3
  min_avg_value_krw: 3000000000  # 30억

  # Macro
  vix_high: 25
  vix_low: 15
  usdkrw_high: 1350
  usdkrw_low: 1250

  # Risk
  max_drawdown_pct: 20
  beta_max: 1.5

# Decision thresholds (v9.6.1: 현실화)
buy_threshold: 60          # 70→60
watch_threshold: 45        # 55→45

# v9.6.1: 상위 시그널 임계치 (config 연동)
strong_buy_threshold: 130
buy_threshold_high: 110
watch_threshold_high: 90

# Sell reason classifier thresholds
sell_reason:
  macro_risk_off:
    spx_drop_pct: -1.2
    vix_spike_pct: 10.0
    usdkrw_spike_pct: 0.6
    broad_sell_pct: 70.0
  flow_mechanical:
    program_ratio_pct: 25.0
    sector_corr: 0.7
    basis_pct: -0.3
  idiosyncratic:
    consensus_drop_pct: -5.0
  technical_sell:
    near_high_pct: 95.0
    volume_multiplier: 2.5
    disparity_pct: 110.0

# v7.0: Market regime-specific weight overrides
# When VIX is in a specific regime, these weights replace the default
regime_weights:
  risk_on:    # VIX < 15 (v9.6.1: flow 축소)
    macro: 0.05
    flow: 0.15
    fundamental: 0.25
    technical: 0.35
    risk: 0.20
  neutral:    # VIX 15-25 (v9.6.1: flow 축소, tech 강화)
    macro: 0.10
    flow: 0.15
    fundamental: 0.30
    technical: 0.30
    risk: 0.15
  risk_off:   # VIX > 25
    macro: 0.20
    flow: 0.10
    fundamental: 0.20
    technical: 0.20
    risk: 0.30
  panic:      # VIX > 35
    macro: 0.25
    flow: 0.05
    fundamental: 0.15
    technical: 0.15
    risk: 0.40

# Factor integration bonus
factor_bonus:
  quintile_1: 10   # Top 20% factor ranking -> +10
  quintile_2: 5    # 60-80% -> +5
  quintile_4: -5   # 20-40% -> -5
  quintile_5: -10  # Bottom 20% -> -10

# v10.0: ML blending configuration
ml_blend:
  enabled: true
  ml_weight: 0.40           # ML 기여 비중 (40%)
  traditional_weight: 0.60  # 전통 스코어 기여 비중 (60%)
  min_confidence: 0.55      # 이 이하면 ML 사용 안 함
