# K-Quant Tenbagger Manager Configuration v2.0
# 4개 AI 합의 + 실전 투자 메모 최종판 반영
# 2026.03.10 기준 — 등급 체계(A/B/C) + 포트폴리오 구조 적용
#
# 등급 기준:
#   A — 10배 경로가 살아 있고, 12~18개월 확인지표 분명 (포지션 8~10%)
#   B — 좋은 사업이지만 10배보다 3~5배 확률이 더 높음 (포지션 4~6%)
#   C — 이벤트/옵션 베팅. 맞으면 크지만 틀리면 오래 고생 (포지션 1~3%)
#
# 포트폴리오 구조: 코어(45%) / 구조적성장(35%) / 옵션(20%)
# 지역 배분: 미국 60% / 한국 40%

version: "2.0"
description: "텐배거 매니저 유니버스 & 스코어링 설정 (최종판)"

# ── 등급 정의 ──────────────────────────────────────────────────
grades:
  A:
    label: "코어 텐배거"
    position_min_pct: 8
    position_max_pct: 10
    description: "10배 경로 + 12~18개월 확인지표 분명"
  B:
    label: "구조적 성장"
    position_min_pct: 4
    position_max_pct: 6
    description: "좋은 사업이지만 3~5배 확률이 더 높음"
  C:
    label: "옵션 베팅"
    position_min_pct: 1
    position_max_pct: 3
    description: "맞으면 크지만 틀리면 오래 고생"

# ── 포트폴리오 구조 ────────────────────────────────────────────
portfolio_structure:
  core_pct: 45          # 코어 텐배거 (A등급)
  structural_pct: 35    # 구조적 성장 (B등급)
  option_pct: 20        # 옵션 (C등급)
  region_us_pct: 60     # 미국 비중
  region_kr_pct: 40     # 한국 비중

