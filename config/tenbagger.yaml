# ── 3-Bucket 체계 (v2.3 P2/P3) ──────────────────────────────
# korea_universe / us_universe = active_tenbagger (기존 유지)
# theme_watchlist = 테마 관찰 종목 (아직 active universe에 편입하지 않은 후보)
# direction_leaders = 섹터 방향 확인용 대형 대표주 (매매 비대상)
#
# bucket 분류:
#   active_tenbagger  — 실제 매매 대상, 포지션 사이징/코칭/리스크 정책 적용
#   theme_watchlist   — 관찰만, 매매 비대상, 승격(promotion) 조건 충족 시 active로 이동
#   direction_leaders — 섹터 on/off 판단용 대형주, 매매 비대상
#
# directness 분류:
#   direct            — 핵심 밸류체인 직접 수혜 (매출의 30%+ 연관)
#   indirect_to_medium — 간접~중간 수혜 (공급망 연관 확인, 매출 검증 중)
#   indirect          — 간접 수혜 (공급망 2차 이상, 매출 기여 미확정)
#   thematic          — 테마 연관이나 실적 연결 약함
#   weak_to_indirect  — 약한~간접 연관
#   weak              — 약한 연관, 순수 테마 플레이

buckets:
  direction_leaders:
    label: "방향성 리더"
    description: "섹터 방향 확인용 대형 대표주. 매수 핵심 대상보다 섹터 on/off 판단용"
    tradeable: false
    criteria:
      - "market_cap_large"
      - "high_liquidity"
      - "sector_leader"
      - "institution_foreign_flow_relevant"
      - "not_required_to_be_10x_candidate"
  active_tenbagger:
    label: "액티브 텐배거"
    description: "실제 점수 반영 및 코칭 대상. 공급망 직접성 + 실적 레버리지 + 촉매가 확인된 후보"
    tradeable: true
    criteria:
      - "direct_or_near_direct_ai_infra_linkage"
      - "earnings_linkage_visible"
      - "capex_beneficiary"
      - "catalyst_present"
      - "liquidity_tradeable"
      - "not_fully_priced_in"
  theme_watchlist:
    label: "테마 워치리스트"
    description: "연관성은 있으나 직접성/실적 연결성 검증이 더 필요한 후보"
    tradeable: false
    criteria:
      - "thematic_or_indirect_linkage"
      - "optionality_exists"
      - "insufficient_earnings_visibility"
      - "requires_promotion_rule"

# ── 방향성 리더 선정 규칙 ────────────────────────────────────
direction_leader_rules:
  sector_price_discovery_role: true
  liquidity_top_tier: true
  institutional_attention: true
  thematic_anchor: true
  earnings_relevance_to_theme: "medium_or_high"

# ── 승격 프로세스 (watchlist → active) ────────────────────────
# 현재: 자동 모니터링 + GPT Pro 수동 승인 구조. 자동 승격 미구현.
promotion_process:
  stage_1_monitoring:
    description: "자동 감시"
    checks:
      - "unusual_volume"
      - "price_strength_vs_sector"
      - "catalyst_keyword_hits"
      - "earnings_revision_signal"
      - "supply_chain_confirmation_signal"
  stage_2_review:
    description: "GPT Pro 리뷰"
    requirements:
      - "directness_revalidated"
      - "earnings_linkage_revalidated"
      - "catalyst_strength_scored"
      - "narrative_not_pure_theme"
  promotion_threshold:
    minimum_conditions:
      - "catalyst_strength >= 70"
      - "directness_to_ai_capex >= medium"
      - "earnings_linkage >= medium"
      - "liquidity_tradeable == true"
      - "at_least_two_new_confirmations == true"

