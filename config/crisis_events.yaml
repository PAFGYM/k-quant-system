# ========================================
# K-Quant 전시/위기 상황 이벤트 설정
# 활성 위기가 있으면 AI 컨텍스트에 자동 주입
# ========================================

active_crises:
  - name: "글로벌 지정학적 위기 (2026.03)"
    type: "geopolitical"
    severity: "high"
    description: >
      글로벌 분쟁 확대로 방산/에너지 섹터 급등세.
      원유 공급 불안, 방위비 증액 기조.
      한반도 안보 리스크 상존.
    beneficiary_sectors:
      - "방산 (한화에어로스페이스, 한화시스템, LIG넥스원, 현대로템)"
      - "정유/에너지 (SK이노베이션, S-Oil, GS, HD현대)"
      - "조선 (HD한국조선해양, 한화오션, 삼성중공업)"
      - "원자력 (두산에너빌리티, 한전기술)"
      - "식량/비료 (남해화학, KG케미칼)"
      - "사이버보안 (안랩, 시큐아이)"
    damaged_sectors:
      - "항공 (대한항공, 아시아나) - 유가 상승 + 노선 위축"
      - "여행/레저 - 여행 심리 위축"
      - "수출 제조업 (반도체 일부) - 공급망 리스크"
      - "원자재 수입 의존 업종 - 원가 상승"
    strategy: >
      1) 방산/에너지는 이미 급등 구간이면 조정 시 분할매수
      2) 아직 덜 오른 2~3선 종목 선별 (실적 뒷받침 확인)
      3) 방산ETF/에너지ETF 활용한 분산 전략
      4) 현금 비중 20~30% 유지 (추가 하락 대비)
      5) 환율 헤지 고려 (원/달러 상승 시 달러 자산 비중 확대)
      6) 달러 급등 시: 외인 매도 가속 → 코스피 추가 하락 압력
      7) KORU(한국3x ETF) 급락은 외국인 시각에서 한국 시장 비관론 신호
      8) 장기 보유종목은 전시에도 홀딩. 단기 종목만 리스크 관리
      9) 유가 100달러 돌파 시: 정유 수혜, 항공/화학 피해 가중
    chase_buy_guide:
      already_surged:
        description: "이미 +30% 이상 급등한 대장주"
        action: "추격매수 자제. 5~10% 조정 시 1차 분할매수"
        examples: "한화에어로스페이스, 현대로템 등"
      second_tier:
        description: "아직 상대적으로 덜 오른 2~3선 종목"
        action: "실적 확인 후 분할매수 검토 가능"
        examples: "LIG넥스원, 한화시스템, 풍산 등"
      etf_strategy:
        description: "ETF를 통한 분산 접근"
        action: "방산ETF, 에너지ETF 분할매수로 리스크 분산"
        examples: "TIGER 방산, KODEX 에너지화학"
    # ── 전쟁 이후 주도주 전환 시나리오 ──
    post_war_rotation:
      description: >
        전쟁/위기 종료 또는 완화 시 주도주가 급변한다.
        방산/에너지 → 소비재/IT/건설 로테이션 발생.
        위기 수혜주 차익실현 물량 + 평화 수혜주 자금 유입.
      warning_signals:
        - "휴전/종전 협상 시작 뉴스"
        - "방산주 고점 대비 -10% 이상 하락 + 거래량 감소"
        - "VIX 25 아래로 안정화 + 원/달러 하락 전환"
        - "외국인 순매수 전환 (코스피 대형주)"
        - "에너지 가격 하락 + 원자재 가격 안정화"
      winners_post_war:
        - "건설/인프라 (전후 복구 수요)"
        - "IT/반도체 (공급망 정상화 + 수요 회복)"
        - "소비재/유통 (소비 심리 회복)"
        - "항공/여행 (유가 하락 + 여행 수요 폭발)"
        - "자동차 (수출 회복 + 환율 안정)"
        - "금융 (경기 회복 기대 + 금리 정상화)"
      losers_post_war:
        - "방산 (실적 피크아웃 우려 → 차익실현 물량)"
        - "정유/에너지 (유가 하락 → 마진 축소)"
        - "금/안전자산 (위험 선호 전환)"
      action_plan: >
        1) 위기 완화 신호 포착 시: 방산/에너지 비중 점진적 축소 (20%씩)
        2) 포트폴리오 리밸런싱: 위기 수혜주 → 평화 수혜주 전환 준비
        3) 건설/IT/소비재 ETF 관심 종목 리스트 사전 준비
        4) 단, "거짓 평화" 함정 주의: 협상 결렬 시 재급등 가능
        5) 장기 보유종목(삼성전자, SK하이닉스 등)은 전환기에 오히려 수혜
        6) 전환기에는 현금 비중 30% 유지하며 양쪽 시나리오 대비

# 위기 해제 시 이 파일에서 해당 항목을 제거하거나
# severity를 "resolved"로 변경
